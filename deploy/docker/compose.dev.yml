services:
  postgres:
    image: postgres:16
    container_name: janus-postgres-dev
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-app}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_app_dev:/var/lib/postgresql/data

  postgres_keycloak:
    image: postgres:16
    container_name: janus-postgres-keycloak-dev
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_keycloak_dev:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: janus-keycloak-dev
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: "http://localhost:8081/auth"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8081:8080"
    volumes:
      - ../helm/janus/files/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres_keycloak:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.4.1
    container_name: janus-grafana-dev
    environment:
      GF_SERVER_ROOT_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - grafana_data_dev:/var/lib/grafana
    depends_on:
      - postgres

volumes:
  pg_app_dev:
  pg_keycloak_dev:
  grafana_data_dev:
