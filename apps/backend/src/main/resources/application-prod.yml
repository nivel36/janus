spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${JANUS_DATASOURCE_URL:jdbc:postgresql://postgres:5432/app}
    username: ${JANUS_DATASOURCE_USERNAME:app}
    password: ${JANUS_DATASOURCE_PASSWORD:app}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URL}
          jwk-set-uri: ${SPRING_JWT_ISSUER_URI}/protocol/openid-connect/certs

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-postgres.sql
      data-locations: classpath:sql/data.sql
      continue-on-error: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    web: INFO
    es.nivel36.janus: INFO

janus:
  cors:
    allowed-origins: ${JANUS_CORS_ALLOWED_ORIGINS:http://localhost}
