spring:
  application:
    name: Janus

  main:
    banner-mode: off

  data:
    rest:
      default-page-size: 20
      max-page-size: 100

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 0

  jpa:
    open-in-view: false
    properties:
      jakarta.persistence.validation.mode: auto
    hibernate:
      ddl-auto: none

server:
  tomcat:
    resource:
      allow-caching: true
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain,text/html,text/css,application/javascript
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%-5level] %logger{36} - %msg%n"

janus:
  api:
    base-path: /api/v1
  cors:
    allowed-origins: ${JANUS_CORS_ALLOWED_ORIGINS:http://localhost:4200}
