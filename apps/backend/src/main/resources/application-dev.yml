spring:
  config:
    activate:
      on-profile: dev

  devtools:
    add-properties: true

  datasource:
    url: ${JANUS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/app}
    username: ${JANUS_DATASOURCE_USERNAME:app}
    password: ${JANUS_DATASOURCE_PASSWORD:app}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URL:http://localhost:8081/auth/realms/janus-realm}

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-postgres.sql
      data-locations: classpath:sql/data.sql
      continue-on-error: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    web: DEBUG
    es.nivel36.janus: TRACE

janus:
  cors:
    allowed-origins: ${JANUS_CORS_ALLOWED_ORIGINS:http://localhost:4200}
