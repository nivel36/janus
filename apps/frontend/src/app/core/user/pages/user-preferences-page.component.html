<app-page-template appNameKey="navigation.janus" pageNameKey="navigation.userPreferences">
    <div pageContent class="page-content preferences-content">
        <section class="card preferences-card">
            <div class="card-body preferences-card-body">
                <form class="form" [formGroup]="form" (ngSubmit)="save()">
                    <div class="field-control">
                        <label for="preferences-locale">
                            {{ 'userPreferences.fields.locale' | translate }}
                        </label>
                        <app-select
                            class="form-control"
                            inputId="preferences-locale"
                            formControlName="locale"
                            [options]="localeOptions"
                        />
                    </div>

                    <div class="field-control">
                        <label for="preferences-time-format">
                            {{ 'userPreferences.fields.timeFormat' | translate }}
                        </label>
                        <app-select
                            class="form-control"
                            inputId="preferences-time-format"
                            formControlName="timeFormat"
                            [options]="timeFormatOptions"
                        />
                    </div>

                    <div class="field-control timezone-control">
                        <label for="preferences-timezone">
                            {{ 'userPreferences.fields.defaultTimezone' | translate }}
                        </label>

                        <app-autocomplete-textbox
                            id="preferences-timezone"
                            formControlName="defaultTimezone"
                            [searchMethod]="searchMethod"
                            [displayWith]="timezoneDisplayWith"
                            [valueWith]="timezoneValueWith"
                            [resolveByValue]="resolveTimezoneByValue"
                            [emptyHint]="'userPreferences.fields.defaultTimezoneHint' | translate"
                        />

                        @if (
                            form.controls.defaultTimezone.touched &&
                            form.controls.defaultTimezone.invalid
                        ) {
                            <p class="message error">
                                {{ 'userPreferences.errors.invalidTimezone' | translate }}
                            </p>
                        }
                    </div>

                    @if (errorMessage) {
                        <p class="message error">{{ errorMessage | translate }}</p>
                    }

                    <div class="buttons">
                        <app-button type="button" variant="secondary" (clicked)="cancel()">
                            {{ 'actions.cancel' | translate }}
                        </app-button>

                        <app-button type="submit" variant="main">
                            {{ 'actions.save' | translate }}
                        </app-button>
                    </div>
                </form>
            </div>
        </section>
    </div>
</app-page-template>
