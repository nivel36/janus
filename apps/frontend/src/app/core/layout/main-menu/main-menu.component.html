@if (currentUser$ | async; as user) {
    <nav class="main-menu" aria-label="Menú principal">
        <div class="main-menu__identity">
            <span class="main-menu__user-name">{{ user.fullName }}</span>
        </div>

        <div class="main-menu__actions">
            <button
                type="button"
                class="main-menu__icon-button main-menu__icon-button--settings"
                aria-label="Configuración"
                title="Configuración"
                (click)="goToSettings()"
            >
                <span aria-hidden="true">⚙</span>
            </button>

            <button
                type="button"
                class="main-menu__icon-button main-menu__icon-button--logout"
                aria-label="Salir"
                title="Salir"
                (click)="logout()"
            >
                <span aria-hidden="true">⏻</span>
            </button>
        </div>
    </nav>
}
