@if (currentUser$ | async; as user) {
    <nav class="main-menu" aria-label="Menú principal">
        <div class="identity">
            <button
                type="button"
                class="user-name"
                [attr.aria-label]="user.fullName"
                [attr.title]="user.fullName"
                (click)="goToUserPreferences()"
            >
                <span aria-hidden="true">{{ user.fullName }}</span>
            </button>
        </div>

        <div class="actions">
            <button
                type="button"
                class="icon-button"
                [attr.aria-label]="'navigation.worksites' | translate"
                [attr.title]="'navigation.worksites' | translate"
                (click)="goToWorksites()"
            >
                <span aria-hidden="true"><fa-icon [icon]="faBuilding"></fa-icon></span>
            </button>

            <button
                type="button"
                class="icon-button"
                [attr.aria-label]="'navigation.schedules' | translate"
                [attr.title]="'navigation.schedules' | translate"
                (click)="goToSchedules()"
            >
                <span aria-hidden="true"><fa-icon [icon]="faCalendarDays"></fa-icon></span>
            </button>

            @if (user.isAdmin) {
                <button
                    type="button"
                    class="icon-button"
                    [attr.aria-label]="'navigation.applicationSettings' | translate"
                    [attr.title]="'navigation.applicationSettings' | translate"
                    (click)="goToApplicationSettings()"
                >
                    <span aria-hidden="true"><fa-icon [icon]="faGear"></fa-icon></span>
                </button>
            }

            <button
                type="button"
                class="icon-button icon-button--logout"
                aria-label="Salir"
                title="Salir"
                (click)="logout()"
            >
                <span aria-hidden="true"><fa-icon [icon]="faPowerOff"></fa-icon></span>
            </button>
        </div>
    </nav>
}
