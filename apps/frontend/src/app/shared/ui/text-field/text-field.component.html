<app-field
    [controlId]="controlId()"
    [label]="label()"
    [hint]="hint()"
    [error]="error()"
    styleClass="text-field"
    [required]="required()"
    [disabled]="disabled"
    [invalid]="!!error()"
>
    <input
        [id]="controlId()"
        type="text"
        [value]="value"
        [disabled]="disabled"
        [required]="required()"
        [attr.autocomplete]="autocomplete()"
        [attr.aria-describedby]="describedBy()"
        [attr.aria-invalid]="error() ? 'true' : null"
        [attr.aria-errormessage]="error() ? controlId() + '-error' : null"
        (input)="onInput($event)"
        (blur)="markTouched()"
    />
</app-field>
