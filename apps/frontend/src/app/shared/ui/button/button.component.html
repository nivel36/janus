<button
    [class]="'app-button ' + variantClass + ' ' + styleClass"
    [attr.type]="type"
    [disabled]="disabled"
>
    @if (hasIconOnLeft) {
        <span class="button-icon" aria-hidden="true">{{ icon }}</span>
    }

    <span class="button-label">
        <ng-content></ng-content>
    </span>

    @if (hasIconOnRight) {
        <span class="button-icon" aria-hidden="true">{{ icon }}</span>
    }
</button>
