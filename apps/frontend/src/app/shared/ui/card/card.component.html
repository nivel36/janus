<section
	class="card {{ styleClass }}"
	role="region"
	[attr.aria-labelledby]="title ? titleId : null"
	[attr.aria-label]="title ? null : ariaLabel"
>
	@if (title || headerTpl) {
	<header class="card-header {{ headerClass }}">
		@if (title) {
		<h2 [id]="titleId" class="card-title {{ titleClass }}">{{ title }}</h2>
		} @if (headerTpl) {
		<ng-container [ngTemplateOutlet]="headerTpl"></ng-container>
		}
	</header>
	}
	<div class="card-body">
		<ng-content></ng-content>
	</div>
	@if (footerTpl) {
	<footer class="card-footer {{ footerClass }}">
		<ng-container [ngTemplateOutlet]="footerTpl"></ng-container>
	</footer>
	}
</section>
