<section
    [id]="resolvedId()"
    class="card {{ styleClass() }}"
    [attr.role]="title() || ariaLabel() ? 'region' : null"
    [attr.aria-labelledby]="title() ? titleId() : null"
    [attr.aria-label]="title() ? null : ariaLabel()"
>
    @if (hasHeader) {
        <header class="card-header">
            @if (title()) {
                <h2 [id]="titleId()" class="card-title">{{ title() }}</h2>
            }
            @if (headerTpl) {
                <ng-container [ngTemplateOutlet]="headerTpl"></ng-container>
            }
        </header>
    }

    <div class="card-body">
        <ng-content></ng-content>
    </div>

    @if (hasFooter) {
        <footer class="card-footer">
            <ng-container [ngTemplateOutlet]="footerTpl"></ng-container>
        </footer>
    }
</section>
