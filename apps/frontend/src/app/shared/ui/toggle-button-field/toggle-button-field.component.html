<app-field
    [controlId]="controlId()"
    [label]="label()"
    [hint]="hint()"
    [error]="error()"
    styleClass="toggle-button-field"
    [required]="required()"
    [disabled]="disabled"
    [invalid]="!!error()"
>
    <button
        [id]="controlId()"
        type="button"
        class="toggle-button"
        [class.toggle-button--checked]="checked"
        [class.toggle-button--disabled]="disabled"
        role="switch"
        [attr.aria-checked]="checked ? 'true' : 'false'"
        [attr.aria-describedby]="describedBy()"
        [attr.aria-invalid]="error() ? 'true' : null"
        [attr.aria-errormessage]="error() ? controlId() + '-error' : null"
        [attr.aria-required]="required() ? 'true' : null"
        [disabled]="disabled"
        (click)="onToggle()"
        (blur)="markAsTouched()"
    >
        <span class="toggle-button__icon" aria-hidden="true">
            {{ checked ? '✓' : '✕' }}
        </span>
        <span class="toggle-button__knob" aria-hidden="true"></span>
    </button>
</app-field>
