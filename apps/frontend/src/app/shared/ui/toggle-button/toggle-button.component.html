<button
    [id]="controlId()"
    type="button"
    class="toggle-button"
    [class.toggle-button--checked]="checked"
    [class.toggle-button--disabled]="disabled"
    role="switch"
    [attr.aria-checked]="checked ? 'true' : 'false'"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-errormessage]="ariaErrorMessage()"
    [attr.aria-invalid]="ariaInvalid() ? 'true' : null"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.aria-required]="required() ? 'true' : null"
    [disabled]="disabled"
    (click)="onToggle()"
    (blur)="markAsTouched()"
>
    <span class="toggle-button__icon" aria-hidden="true">
        {{ checked ? '✓' : '✕' }}
    </span>
    <span class="toggle-button__knob" aria-hidden="true"></span>
</button>
