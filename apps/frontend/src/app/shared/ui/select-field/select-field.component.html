<app-field
    [controlId]="controlId()"
    [label]="label()"
    [hint]="hint()"
    [error]="error()"
    styleClass="select-field"
    [required]="required()"
    [disabled]="disabled"
    [invalid]="!!error()"
>
    <div class="select" [class.disabled]="disabled">
        <select
            #nativeSelect
            [id]="controlId()"
            [disabled]="disabled"
            [required]="required()"
            [attr.aria-describedby]="describedBy()"
            [attr.aria-invalid]="error() ? 'true' : null"
            [attr.aria-errormessage]="error() ? controlId() + '-error' : null"
            [value]="value ?? ''"
            (change)="onSelectionChange($event)"
            (blur)="markTouched()"
        >
            @for (option of options(); track option.value) {
                <option [value]="option.value">
                    {{ option.labelKey | translate }}
                </option>
            }
        </select>

        <span class="arrow" aria-hidden="true">▾</span>
    </div>
</app-field>
