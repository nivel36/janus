<input
    [id]="controlId"
    [type]="type()"
    [value]="value"
    [disabled]="disabled"
    [required]="required()"
    [readOnly]="readonly()"
    [attr.role]="role()"
    [attr.autocomplete]="autocomplete()"
    [attr.autocapitalize]="autocapitalize()"
    [attr.autocorrect]="autocorrect()"
    [attr.spellcheck]="formatBooleanAria(spellcheck())"
    [attr.placeholder]="placeholder()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.aria-invalid]="ariaInvalid() ? 'true' : null"
    [attr.aria-errormessage]="ariaErrorMessage()"
    [attr.aria-expanded]="formatBooleanAria(ariaExpanded())"
    [attr.aria-haspopup]="formatBooleanAria(ariaHaspopup())"
    [attr.aria-controls]="ariaControls()"
    [attr.aria-activedescendant]="ariaActiveDescendant()"
    [attr.aria-busy]="formatBooleanAria(ariaBusy())"
    [attr.aria-autocomplete]="ariaAutocomplete()"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
    (blur)="onBlur($event)"
/>
