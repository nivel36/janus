<app-field
    [controlId]="controlId()"
    [label]="label()"
    [hint]="hint()"
    [error]="error()"
    styleClass="range-slider-field"
    [required]="required()"
    [disabled]="disabled"
    [invalid]="!!error()"
>
    <div class="range-slider">
        <span class="range-slider__value">{{ value }}{{ unit() ? ' ' + unit() : '' }}</span>

        <div class="range-slider__track-wrapper">
            <input
                [id]="controlId()"
                type="range"
                class="range-slider__input"
                [min]="min()"
                [max]="max()"
                [step]="step()"
                [value]="value"
                [disabled]="disabled"
                [required]="required()"
                [attr.aria-describedby]="describedBy()"
                [attr.aria-invalid]="error() ? 'true' : null"
                [attr.aria-errormessage]="error() ? controlId() + '-error' : null"
                [attr.aria-valuemin]="min()"
                [attr.aria-valuemax]="max()"
                [attr.aria-valuenow]="value"
                [attr.aria-valuetext]="valueText"
                [style.--progress]="progressPercent + '%'"
                [style.--progress-value]="progressPercent"
                (input)="onInput($event)"
                (blur)="onBlur()"
            />
        </div>
    </div>
</app-field>
