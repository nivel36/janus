<main class="app-shell">
    <section class="settings-page">
        <header class="settings-header">
            <h1 class="brand">
                {{ 'navigation.janus' | translate }}
            </h1>
            <div class="header-actions">
                <span class="section-label">
                    {{ 'navigation.applicationSettings' | translate }}
                </span>
            </div>
        </header>

        <section class="settings-content">
            <app-card styleClass="settings-card">
                <form [formGroup]="form" (ngSubmit)="save()">
                    <div class="days-until-locked-control">
                        <app-range-slider
                            formControlName="daysUntilLocked"
                            [label]="'applicationSettings.fields.daysUntilLocked' | translate"
                            [min]="0"
                            [max]="daysUntilLockedSliderMax"
                            [step]="1"
                        />
                    </div>

                    <label>
                        <app-toggle-button
                            formControlName="employeeWorkplaceCreationAllowed"
                        ></app-toggle-button>
                        {{
                            'applicationSettings.fields.employeeWorkplaceCreationAllowed'
                                | translate
                        }}
                    </label>

                    <label>
                        <app-toggle-button
                            formControlName="worksiteChangeDuringShiftAllowed"
                        ></app-toggle-button>
                        {{
                            'applicationSettings.fields.worksiteChangeDuringShiftAllowed'
                                | translate
                        }}
                    </label>

                    <p class="message error" *ngIf="errorMessage">
                        {{ errorMessage | translate }}
                    </p>

                    <div class="buttons">
                        <app-button type="button" variant="secondary" (clicked)="goBack()">
                            {{ 'actions.cancel' | translate }}
                        </app-button>

                        @if (isAdmin) {
                            <app-button
                                type="submit"
                                [disabled]="form.invalid || saving"
                                variant="main"
                            >
                                {{ 'actions.save' | translate }}
                            </app-button>
                        }
                    </div>
                </form>
            </app-card>
        </section>
    </section>
</main>
