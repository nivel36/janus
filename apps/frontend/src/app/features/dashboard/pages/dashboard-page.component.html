<app-page-template appNameKey="navigation.janus" pageNameKey="navigation.dashboard">
    <div pageContent class="app-page-content dashboard-page__content">
        @if (employeeEmail$ | async; as employeeEmail) {
            <app-timelog-clock-card
                id="clock"
                [employeeEmail]="employeeEmail"
                (clockActionDone)="onClockActionDone()"
            />

            <app-employee-card id="employee" [fullName]="fullName$ | async" />

            <app-timelog-table
                id="records"
                [employeeEmail]="employeeEmail"
                [refreshToken]="tableRefreshToken"
            />
        }
    </div>
</app-page-template>
