<main class="app-shell">
    <section class="dashboard">
        <header class="dashboard-header">
            <h1 class="brand">
                {{ 'navigation.janus' | translate }}
            </h1>
            <span class="section-label">
                {{ 'navigation.dashboard' | translate }}
            </span>
        </header>

        <section class="dashboard-content">
            <!-- MAIN CONTENT -->
            <section class="content">
                <app-card styleClass="clock-in-card" [title]="clockActionLabelKey | translate">
                    <ng-template #cardHeader>
                        <app-clock styleClass="card-hour-container" timeClass="card-hour">
                        </app-clock>

                        @if (canClockInOut$ | async) {
                            <app-button [disabled]="isClockActionLoading" (click)="onClockAction()">
                                {{ clockActionLabelKey | translate }}
                            </app-button>
                        }

                        @if (clockActionFeedbackKey) {
                            <p class="clock-action-feedback" role="status" aria-live="polite">
                                {{ clockActionFeedbackKey | translate }}
                            </p>
                        }
                    </ng-template>
                </app-card>

                <app-timelog-table
                    [employeeEmail]="employeeEmail"
                    [refreshToken]="tableRefreshToken"
                >
                </app-timelog-table>
            </section>

            <!-- ASIDE -->
            <section class="aside">
                <app-user-card [fullName]="fullName$ | async"></app-user-card>
            </section>
        </section>
    </section>
</main>
