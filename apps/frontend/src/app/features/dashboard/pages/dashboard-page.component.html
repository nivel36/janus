<app-page-template appNameKey="navigation.janus" pageNameKey="navigation.dashboard">
    <section page-body class="dashboard-content">
        @if (employeeEmail$ | async; as employeeEmail) {
            <section class="clock-card">
                <app-timelog-clock-card
                    [employeeEmail]="employeeEmail"
                    (clockActionDone)="onClockActionDone()"
                />
            </section>

            <section class="employee-card">
                <app-employee-card [fullName]="fullName$ | async"></app-employee-card>
            </section>

            <section class="records-card">
                <app-timelog-table
                    [employeeEmail]="employeeEmail"
                    [refreshToken]="tableRefreshToken"
                />
            </section>
        }
    </section>

    <div page-footer></div>
</app-page-template>
