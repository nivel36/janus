<app-card
    styleClass="worksite-detail__panel worksite-detail__panel--summary"
    title="{{ 'worksite.sections.summary' | translate }}"
>
    <div class="worksite-detail__summary-grid">
        <app-summary-card
            [icon]="faUsers"
            [label]="'worksite.summary.employees' | translate"
            [value]="24"
        />

        <app-summary-card
            [icon]="faClock"
            [label]="'worksite.summary.activeShifts' | translate"
            [value]="3"
        />

        <app-summary-card
            [icon]="faCalendarDays"
            [label]="'worksite.summary.todayTimelogs' | translate"
            [value]="19"
        />

        <app-summary-card
            [icon]="faExclamationTriangle"
            [label]="'worksite.summary.incidents' | translate"
            [value]="0"
        />
    </div>
</app-card>
