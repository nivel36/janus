<article class="worsite-detail-header">
    <div class="worsite-detail-header__identity">
        <div class="worsite-detail-header__icon" aria-hidden="true">
            <fa-icon [icon]="faBuilding"></fa-icon>
        </div>

        <div class="worsite-detail-header__details">
            <h2>{{ worksite().name }}</h2>
            <p>
                <span>{{ worksite().code }}</span>
                <app-chip [label]="'worksite.scopes.' + worksite().scope | translate"></app-chip>
            </p>
        </div>
    </div>

    <app-chip
        class="worsite-detail-header__status"
        [type]="worksite().active ? 'green' : 'red'"
        [icon]="faCircle"
        size="big"
        [label]="
            (worksite().active ? 'worksite.status.active' : 'worksite.status.inactive') | translate
        "
    ></app-chip>
</article>
