@if (vm$ | async; as vm) {
    <section class="card clock-in-card" [attr.aria-labelledby]="titleElementId">
        <header class="card-header clock-in-card-header">
            <h3 class="card-title clock-in-card-title" [id]="titleElementId">
                {{ vm.clockActionTitleKey | translate }}
            </h3>
        </header>
        <div class="card-body clock-in-card-body">
            <app-clock [locale]="vm.locale" [use12Hour]="vm.use12Hour"></app-clock>

            @if (vm.hasClockInOutPermission) {
                <app-button [disabled]="vm.isClockActionLoading" (clicked)="onClockAction()">
                    {{ vm.clockActionLabelKey | translate }}
                </app-button>
            }

            @if (vm.clockActionFeedbackKey; as feedbackKey) {
                <p class="clock-action-feedback" role="status" aria-live="polite">
                    {{ feedbackKey | translate }}
                </p>
            }
        </div>

        <footer class="card-footer clock-in-card-footer">
            @if (vm.hasClockInOutPermission) {
                <button
                    type="button"
                    class="secondary-action"
                    [disabled]="vm.isClockActionLoading"
                    (click)="onOppositeClockAction()"
                >
                    {{ vm.oppositeClockActionLabelKey | translate }}
                    <span class="icon">
                        <fa-icon [icon]="faAngleRight"></fa-icon>
                    </span>
                </button>
            }
        </footer>
    </section>
}
