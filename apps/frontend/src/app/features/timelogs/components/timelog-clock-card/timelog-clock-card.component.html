<app-card
    styleClass="clock-in-card"
    footerClass="clock-card-footer"
    [title]="clockActionTitleKey$ | async | translate"
>
    <ng-template #cardHeader>
        <app-clock styleClass="card-hour-container" timeClass="card-hour"></app-clock>

        @if (canClockInOut$ | async) {
            <app-button
                [disabled]="(isClockActionLoading$ | async) ?? false"
                (click)="onClockAction()"
            >
                {{ clockActionLabelKey$ | async | translate }}
            </app-button>
        }

        @if (clockActionFeedbackKey$ | async; as feedbackKey) {
            <p class="clock-action-feedback" role="status" aria-live="polite">
                {{ feedbackKey | translate }}
            </p>
        }
    </ng-template>

    <ng-template #cardFooter>
        @if (canClockInOut$ | async) {
            <a
                class="secondary-action"
                [class.disabled]="(isClockActionLoading$ | async) ?? false"
                (click)="onOppositeClockAction()"
                role="button"
                tabindex="0"
            >
                {{ oppositeClockActionLabelKey$ | async | translate }}
            </a>
        }
    </ng-template>
</app-card>
